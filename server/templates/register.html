<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Sign-In — VRH</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#1c1c1c;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:30px 20px}
  .container{width:100%;max-width:640px}
  .logo{text-align:center;margin-bottom:8px}
  .logo span{font-size:28px;font-weight:800;color:#f5c518;letter-spacing:2px}
  .form-title{text-align:center;font-size:20px;font-weight:700;color:#fff;margin-bottom:28px}
  .form-group{margin-bottom:20px}
  .form-group label{display:block;font-size:14px;color:#ccc;margin-bottom:6px}
  .form-group input[type="text"],.form-group input[type="email"],.form-group input[type="tel"],.form-group input[type="date"]{width:100%;padding:10px 14px;background:#3a3a3a;border:1px solid #555;border-radius:4px;color:#e0e0e0;font-size:14px;outline:none}
  .form-group input:focus{border-color:#f5c518}
  .form-group input[type="date"]{color-scheme:dark}
  .disclaimer{background:#2a2a2a;border:1px solid #444;border-radius:4px;padding:12px 16px;margin:24px 0 12px;font-size:13px;color:#e0e0e0}
  .accept-row{display:flex;align-items:center;gap:8px;margin-bottom:28px;font-size:13px;color:#ccc}
  .accept-row input[type="checkbox"]{width:16px;height:16px;accent-color:#4a9eff;cursor:pointer}
  .button-row{display:flex;justify-content:center;gap:12px}
  .btn-register{padding:10px 32px;border-radius:4px;border:1px solid #666;background:#3a3a3a;color:#e0e0e0;font-size:14px;font-weight:600;cursor:pointer}
  .btn-register:hover{background:#4a4a4a}
  .btn-register:disabled{opacity:.4;cursor:not-allowed}
  .btn-clear{padding:10px 24px;border-radius:4px;border:1px solid #ff5252;background:transparent;color:#ff5252;font-size:14px;font-weight:600;cursor:pointer}
  .btn-clear:hover{background:#3e1a1a}
  .success-msg{text-align:center;color:#69f0ae;font-size:15px;font-weight:600;margin-top:18px;display:none}
  .error-msg{text-align:center;color:#ff5252;font-size:14px;margin-top:12px;display:none}
  .phone-group.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="logo"><span>VRH</span></div>
  <h1 class="form-title" id="form-title">Driver Sign-In</h1>
  <form id="reg-form" onsubmit="return submitForm(event)">
    <div class="form-group">
      <label id="lbl-name">First and Lastname:</label>
      <input type="text" id="f-name" required>
    </div>
    <div class="form-group">
      <label id="lbl-birthday">Birthday:</label>
      <input type="date" id="f-birthday">
    </div>
    <div class="form-group">
      <label id="lbl-email">Email:</label>
      <input type="email" id="f-email">
    </div>
    <div class="form-group phone-group" id="phone-group">
      <label id="lbl-phone">Phone:</label>
      <input type="tel" id="f-phone" pattern="[0-9]{10}" minlength="10" maxlength="10" inputmode="numeric"
             oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
             placeholder="10-digit number">
    </div>
    <div class="disclaimer" id="disclaimer-block"></div>
    <div class="accept-row">
      <input type="checkbox" id="f-accept">
      <label for="f-accept" id="lbl-accept">Accept</label>
    </div>
    <div class="button-row">
      <button type="submit" class="btn-register" id="btn-submit">Register</button>
      <button type="button" class="btn-clear" id="btn-clear" onclick="clearForm()">Clear</button>
    </div>
  </form>
  <div class="success-msg" id="success-msg">✓ Registration successful!</div>
  <div class="error-msg" id="error-msg"></div>
</div>
<script>
async function loadSettings(){
  try{
    const res=await fetch('/api/registration-settings');
    const s=await res.json();
    document.getElementById('form-title').textContent=s.title||'Driver Sign-In';
    document.getElementById('lbl-name').textContent=(s.name_placeholder||'First and Lastname')+':';
    document.getElementById('lbl-birthday').textContent=(s.birthday_placeholder||'Birthday')+':';
    document.getElementById('lbl-email').textContent=(s.email_placeholder||'Email')+':';
    document.getElementById('lbl-phone').textContent=(s.phone_placeholder||'Phone')+':';
    if(s.show_phone===false)document.getElementById('phone-group').classList.add('hidden');
    document.getElementById('disclaimer-block').innerHTML=s.text_block||'';
    document.getElementById('lbl-accept').textContent=s.accept_text||'Accept';
    document.getElementById('btn-submit').textContent=s.send_button||'Register';
    document.getElementById('btn-clear').textContent=s.clear_button||'Clear';
  }catch(e){console.error(e)}
}
function fmtDate(v){if(!v)return '';const d=new Date(v);return isNaN(d)?v:`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`}
async function submitForm(e){
  e.preventDefault();
  if(!document.getElementById('f-accept').checked){showError('Please accept the terms.');return false}
  const name=document.getElementById('f-name').value.trim();
  if(!name){showError('Please enter your name.');return false}
  const phoneGroup=document.getElementById('phone-group');
  const phoneVisible=phoneGroup&&!phoneGroup.classList.contains('hidden');
  const phoneVal=document.getElementById('f-phone').value.trim();
  if(phoneVisible&&phoneVal&&phoneVal.length!==10){showError('Phone number must be exactly 10 digits.');return false}
  try{
    const res=await fetch('/api/drivers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,birthday:fmtDate(document.getElementById('f-birthday').value),email:document.getElementById('f-email').value.trim(),phone:document.getElementById('f-phone').value.trim(),signed:true})});
    if(res.ok){document.getElementById('success-msg').style.display='block';document.getElementById('error-msg').style.display='none';document.getElementById('reg-form').reset();setTimeout(()=>document.getElementById('success-msg').style.display='none',4000)}
    else showError('Registration failed.');
  }catch(err){showError('Network error.')}
  return false;
}
function clearForm(){document.getElementById('reg-form').reset();document.getElementById('success-msg').style.display='none';document.getElementById('error-msg').style.display='none'}
function showError(m){const el=document.getElementById('error-msg');el.textContent=m;el.style.display='block';setTimeout(()=>el.style.display='none',4000)}
loadSettings();
</script>
</body>
</html>
